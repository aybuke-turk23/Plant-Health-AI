<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantaı — Bitki Sağlığı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
      <span class="orb orb-d"></span>
      <span class="orb orb-e"></span>


    </div>

    <main class="shell">
      <header class="brand">
        <span class="logo" aria-hidden="true">🌿</span>
        <div>
          <h1>Plant AI</h1>
          <p class="tagline">Bitki fotoğrafını yükle, sağlık skorunu ve önerileri al</p>
        </div>
      </header>

      <section class="composer" aria-label="Görüntü yükleme">
        <div
          class="dropzone"
          id="dropzone"
          tabindex="0"
          role="button"
          aria-label="Dosya sürükleyip bırak veya tıkla"
        >
          <input type="file" id="file-input" accept="image/*" hidden />
          <div class="dropzone-inner">
            <span class="drop-icon" aria-hidden="true">+</span>
            <p class="drop-title">Bitki fotoğrafını buraya bırak veya tıkla</p>
            <p class="drop-hint">PNG, JPG, WebP · API ile analiz</p>
          </div>
        </div>

        <div class="preview-row hidden" id="preview-row">
          <img id="preview-img" alt="Önizleme" />
          <button type="button" class="btn-ghost" id="clear-btn">Kaldır</button>
        </div>

        <button type="button" class="btn-primary" id="analyze-btn" disabled>
          <span id="btn-label">Analiz et</span>
          <span class="spinner hidden" id="spinner" aria-hidden="true"></span>
        </button>
      </section>

      <section class="result hidden" id="result" aria-live="polite">
        <div class="result-card">
          <div class="score-ring-wrap">
            <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="ring-bg" cx="60" cy="60" r="52" />
              <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52" />
            </svg>
            <div class="score-center">
              <span class="score-value" id="score-value">—</span>
              <span class="score-label">sağlık</span>
            </div>
          </div>
          <p class="summary" id="summary"></p>
          <div class="lists">
            <div>
              <h2>Tespitler</h2>
              <ul id="issues-list"></ul>
            </div>
            <div>
              <h2>Öneriler</h2>
              <ul id="recs-list"></ul>
            </div>
          </div>
        </div>
      </section>

      <p class="error hidden" id="error" role="alert"></p>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
